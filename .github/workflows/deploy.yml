name: Deploy ReviewReach Frontend
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: 3775eabe3a8be67a2fed507d309f09a53533ea07d52ff1d605b14836b77c505a07-9963ac8f-2419-4ea6-8626-2d59779aea4d00f19180c10d9e0f
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          skip_app_build: true
